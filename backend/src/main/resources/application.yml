spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/forklift_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: mysupersecretkeymysupersecretkeymysupersecretkey
  expiration: 86400000
